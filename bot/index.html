<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catpuccino bot control console</title>

    <style>
        .logs {
            background-color: gainsboro;
            max-height: 150px;
            overflow: scroll;
            padding: 5px;
            margin-bottom: 10px;
        }

        .agent-logs {
            margin-left: 10px;
        }

        html,
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <h1>Catpuccino bot control console</h1>

    <h3>Status</h3>
    <br>

    <h3>Sleeper agents</h3>
    <div class="agent-logs" id="agents-container"></div>

    <template id="agent-template">
        <div class="agent">
            <h4 class="agent-name"></h4>
            <div>
                <p class="status">Status : </p>
                <button class="enable-btn">Enable</button>
                <button class="disable-btn">Disable</button>
            </div>
            <div class="logs"></div>
        </div>
    </template>

    <script>
        const agents = [
            "crown",
            "dementia",
            "foxy",
            "hypnosis",
            "invisible",
            "laqueefa",
            "mudae",
            "perfect",
            "roach",
            "starwalker"
        ];

        const lastLogs = {};
        const container = document.getElementById("agents-container");
        const template = document.getElementById("agent-template");

        for (const agent of agents) {
            const clone = template.content.cloneNode(true);
            const root = clone.querySelector(".agent");

            root.dataset.agent = agent;
            clone.querySelector(".agent-name").innerText = agent.toUpperCase();

            const logsDiv = clone.querySelector(".logs");
            logsDiv.id = `${agent}-logs`;

            const agentStatus = clone.querySelector(".status");
            agentStatus.id = `${agent}-status`;

            const statusEl = clone.querySelector(".status");
            const enableBtn = clone.querySelector(".enable-btn");
            const disableBtn = clone.querySelector(".disable-btn");

            enableBtn.addEventListener("click", () =>
                toggleAgent("enable", agent, statusEl)
            );

            disableBtn.addEventListener("click", () =>
                toggleAgent("disable", agent, statusEl)
            );

            container.appendChild(clone);
        }

        async function toggleAgent(action, name, statusEl) {
            try {
                const response = await fetch(`/${action}?name=${name}`);
                const statusResponse = await fetch(`/status?name={name}`);
                
                const status = await statusResponse.json();

                statusEl.innerText = `Status : ${status.enabled ? "Enabled" : "Disabled"}`;
            } catch (err) {
                statusEl.innerText = "Status : ERROR";
            }
        }

        async function updateLogs(name) {
            const div = document.getElementById(`${name}-logs`);
            const statusP = document.getElementById(`${name}-status`)

            const response = await fetch(`/log?name=${name}`);
            let logs = await response.json();

            const statusResponse = await fetch(`/status?name=${name}`);    
            const status = await statusResponse.json();

            statusP.innerText = `Status : ${status.enabled ? "Enabled" : "Disabled"}`;

            const serialized = JSON.stringify(logs);
            if (lastLogs[name] === serialized) return;

            lastLogs[name] = serialized;
            div.innerHTML = "";

            logs.reverse();
            for (const line of logs) {
                const p = document.createElement("p");
                p.innerText =
                    `${line.timestamp} : ${line.log} : ${line.proc ? "PROCCED" : "NO PROC"}`;
                div.appendChild(p);
            }
        }

        for (const agent of agents) {
            setInterval(() => updateLogs(agent), 5000);
        }
    </script>

</body>

</html>
